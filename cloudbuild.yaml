steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sevalink', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sevalink']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sevalink
      - --image=gcr.io/$PROJECT_ID/sevalink
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY,NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$FIREBASE_PROJECT_ID
    secretEnv: ['GEMINI_API_KEY', 'FIREBASE_PROJECT_ID']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_PROJECT_ID/versions/latest
      env: 'FIREBASE_PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/sevalink'
